<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Cadastre Aisne</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([49.5, 3.5], 9);

// Fond de carte OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let layer;

// Charger les parcelles depuis ton API
async function loadParcelles() {
  const bbox = map.getBounds().toBBoxString();

  const res = await fetch(`http://localhost:3000/parcelles?bbox=${bbox}`);
  const data = await res.json();

  // Supprimer ancienne couche
  if (layer) {
    map.removeLayer(layer);
  }

  // Convertir en GeoJSON
  const features = data.map(p => ({
    type: "Feature",
    geometry: JSON.parse(p.geom),
    properties: p
  }));

  layer = L.geoJSON(features, {
    style: {
      color: "blue",
      weight: 1
    },
onEachFeature: (feature, layer) => {

  layer.on("click", async () => {

    const p = feature.properties;

    layer.bindPopup("Chargement...").openPopup();

    try {
      // 1️⃣ MAJIC
      const resMajic = await fetch(
        `http://localhost:3000/majic?commune=${p.commune}&section=${p.section}&numero=${p.numero}`
      );

      const majicData = await resMajic.json();

      let content = `
        <b>Parcelle</b><br>
        Commune: ${p.commune}<br>
        Section: ${p.section}<br>
        Numéro: ${p.numero}<br>
        Surface: ${p.contenance} m²<br><br>
      `;

      if (majicData.length > 0) {

        const sirenResponses = await Promise.all(
            majicData.map(m =>
            fetch(`http://localhost:3000/siren/${m.num_siren}`)
                .then(res => res.json())
            )
        );

        for (let i = 0; i < majicData.length; i++) {
            const m = majicData[i];
            const s = sirenResponses[i];

            content += `
            <b>SIREN :</b> ${m.num_siren}<br>
            <b>Nom :</b> ${s.nom || "N/A"}<br>
            <b>Activité (NAF) :</b> ${s.activite || "N/A"}<br>
            <b>Type :</b> ${s.type || "N/A"}<br>
            <b>Statut :</b> ${s.etat || "N/A"}<br>
            <b>Création :</b> ${s.date_creation || "N/A"}<br><br>
            `;
        }

      } else {
        content += "Aucune donnée MAJIC";
      }

      layer.setPopupContent(content);

    } catch (err) {
      layer.setPopupContent("Erreur lors du chargement");
      console.error(err);
    }
  });

}
    }).addTo(map);
}

// Charger au début
loadParcelles();

// Recharger quand on bouge
map.on("moveend", loadParcelles);
</script>

</body>
</html>
